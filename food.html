<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <title>Zenith Store | Fresh Food</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .page-banner {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('table-filled-with-large-variety-of-food-shot-from-royalty-free-image-1659038707.jpg');
            background-size: cover; background-position: center; height: 250px;
            display: flex; align-items: center; justify-content: center; color: white;
            border-radius: 15px; margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo"><i class="fas fa-shopping-cart"></i> ZENITH <span>STORE</span></div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="checkout.html">Checkout</a></li>
                <li><a href="food.html" class="active">Food</a></li>
                <li><a href="cart.html">Cart</a></li>
            </ul>
        </nav>
        <button onclick="toggleTheme()"><i class="fas fa-adjust"></i></button>
    </header>

    <main style="padding: 0 5%;">
        <div class="page-banner"><h1>FRESH FOOD</h1></div>
        <section class="product-grid">
            <article class="product-card">
                <img src="https://images.pexels.com/photos/1132047/pexels-photo-1132047.jpeg?w=400" alt="Fruits">
                <h4>Organic Fruit Box</h4>
                <p>$20.00</p>
                <button class="add-btn" onclick="addToCart('Fruit Box', 20)">Add to Cart</button>
            </article>
            <article class="product-card">
                <img src="https://images.pexels.com/photos/102104/pexels-photo-102104.jpeg?w=400" alt="Apple">
                <h4>Red Apples (1kg)</h4>
                <p>$5.00</p>
                <button class="add-btn" onclick="addToCart('Apples', 5)">Add to Cart</button>
            </article>
        </section>
    </main>
    <script src="js/main.js"></script>
</body>
</html>
