<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <title>Zenith Store | Electronics</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .page-banner {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('OIP.webp');
            background-size: cover; background-position: center; height: 250px;
            display: flex; align-items: center; justify-content: center; color: white;
            border-radius: 15px; margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo"><i class="fas fa-laptop"></i> ZENITH <span>STORE</span></div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="checkout.html">Checkout</a></li>
                <li><a href="electronics.html" class="active">Electronics</a></li>
                <li><a href="cart.html">Cart</a></li>
            </ul>
        </nav>
        <button onclick="toggleTheme()"><i class="fas fa-adjust"></i></button>
    </header>

    <main style="padding: 0 5%;">
        <div class="page-banner"><h1>SMART ELECTRONICS</h1></div>
        <section class="product-grid">
            <article class="product-card">
                <img src="https://images.pexels.com/photos/1649771/pexels-photo-1649771.jpeg?w=400" alt="Headphones">
                <h4>Wireless Headphones</h4>
                <p>$89.00</p>
                <button class="add-btn" onclick="addToCart('Headphones', 89)">Add to Cart</button>
            </article>
            <article class="product-card">
                <img src="https://images.pexels.com/photos/190819/pexels-photo-190819.jpeg?w=400" alt="Watch">
                <h4>Smart Watch Series 7</h4>
                <p>$250.00</p>
                <button class="add-btn" onclick="addToCart('Smart Watch', 250)">Add to Cart</button>
            </article>
        </section>
    </main>
    <script src="js/main.js"></script>
</body>
</html>
