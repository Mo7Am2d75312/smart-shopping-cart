<main class="checkout-container">
    <form id="customForm">
        <h3>بيانات الشحن والدفع</h3>
        <input type="text" id="uName" placeholder="الاسم الكامل" required>
        <input type="email" id="uEmail" placeholder="البريد الإلكتروني" required>
        <input type="text" id="uPhone" placeholder="رقم الهاتف" required>
        <select id="payment">
            <option value="cod">دفع عند الاستلام</option>
            <option value="card">بطاقة ائتمان</option>
        </select>
        <button type="submit">تأكيد الطلب</button>
    </form>
</main>
<script src="js/validation.js"></script>
