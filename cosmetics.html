<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <title>Zenith Store | Cosmetics</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .page-banner {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('cosmetic-trends-1400x480.jpg');
            background-size: cover; background-position: center; height: 250px;
            display: flex; align-items: center; justify-content: center; color: white;
            border-radius: 15px; margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo"><i class="fas fa-magic"></i> ZENITH <span>STORE</span></div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="checkout.html">Checkout</a></li>
                <li><a href="cosmetics.html" class="active">Cosmetics</a></li>
                <li><a href="cart.html">Cart</a></li>
            </ul>
        </nav>
        <button onclick="toggleTheme()"><i class="fas fa-adjust"></i></button>
    </header>

    <main style="padding: 0 5%;">
        <div class="page-banner"><h1>BEAUTY & CARE</h1></div>
        <section class="product-grid">
            <article class="product-card">
                <img src="https://images.pexels.com/photos/3373736/pexels-photo-3373736.jpeg?w=400" alt="Makeup">
                <h4>Premium Lipstick Set</h4>
                <p>$30.00</p>
                <button class="add-btn" onclick="addToCart('Lipstick Set', 30)">Add to Cart</button>
            </article>
            <article class="product-card">
                <img src="https://images.pexels.com/photos/3762466/pexels-photo-3762466.jpeg?w=400" alt="Skincare">
                <h4>Face Moisturizer</h4>
                <p>$15.00</p>
                <button class="add-btn" onclick="addToCart('Moisturizer', 15)">Add to Cart</button>
            </article>
        </section>
    </main>
    <script src="js/main.js"></script>
</body>
</html>
